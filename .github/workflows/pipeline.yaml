# nom
name: CD/CI Pipeline

#TRIGGER : déclenche le pipeline
on:
  push:
    branches:
      - Alexandre

# JOBS : ensemble d'étapes
jobs:
  build-and-push:
    runs-on: ubuntu-latest      # RUNNER : VM qui exécute le job, fourni par GitHub

# STEPS : les étapes
    steps:
      # STEP 1 : récupérer le code sur le runner
      - name: Checkout du code
        uses: actions/checkout@v4  #action officielle GitHub
      # STEP 2 : se connecter à Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3  #action officielle Docker
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # STEP 3 : builder et pusher l'image du Backend
      - name: Build & push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: monuser/monapp-backend:latest

      # STEP 4 : builder et pusher l'image du Frontend
      - name: Build & push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: monuser/monapp-frontend:latest

# nom
name: CD/CI Pipeline

#TRIGGER : déclenche le pipeline
on:
  push:
    branches:
      - main

# JOBS : ensemble d'étapes
jobs:
  build-and-push:
    runs-on: ubuntu-latest      # RUNNER : VM qui exécute le job, fourni par GitHub

# STEPS : les étapes
    steps:
      # STEP 1 : récupérer le code sur le runner
      - name: Checkout du code
        uses: actions/checkout@v4  #action officielle GitHub
      # STEP 2 : se connecter à Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3  #action officielle Docker
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      # STEP 3 : builder et pusher l'image
      - name: Build et push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: monuser/monapp:latest
